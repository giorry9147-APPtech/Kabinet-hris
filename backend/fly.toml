# Kabinet HRIS — backend (Laravel 12 + Filament + Sanctum) on Fly.io
#
# Edit `app` to whatever name you used in `fly launch`.
# Region `ams` = Amsterdam (closest free EU region for Suriname latency-wise);
# `gru` (São Paulo) is geographically closer but has lower free-tier coverage.

app = "kabinet-hris-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV          = "production"
  APP_DEBUG        = "false"
  APP_LOCALE       = "nl"
  APP_FALLBACK_LOCALE = "en"
  APP_TIMEZONE     = "America/Paramaribo"

  LOG_CHANNEL      = "stderr"
  LOG_STACK        = "single"
  LOG_LEVEL        = "warning"

  DB_CONNECTION    = "pgsql"
  DB_SSLMODE       = "require"

  SESSION_DRIVER         = "database"
  SESSION_LIFETIME       = "120"
  SESSION_SECURE_COOKIE  = "true"
  SESSION_SAME_SITE      = "lax"

  CACHE_STORE      = "database"
  QUEUE_CONNECTION = "database"
  FILESYSTEM_DISK  = "public"

  MAIL_MAILER          = "log"
  MAIL_FROM_ADDRESS    = "demo@kabinet-hris.invalid"
  MAIL_FROM_NAME       = "Kabinet HRIS Demo"

  MAS_LEAVE_YEARLY_DAYS = "24"

  # Filled by `fly secrets set` — do NOT put real values here:
  #   APP_KEY                   (php artisan key:generate --show)
  #   APP_URL                   (https://<your-app>.fly.dev)
  #   FRONTEND_URL              (https://<your-vercel-app>.vercel.app)
  #   CORS_ALLOWED_ORIGINS      (https://<your-vercel-app>.vercel.app)
  #   SANCTUM_STATEFUL_DOMAINS  (<your-vercel-app>.vercel.app)
  #   ADMIN_EMAIL               (login for super_admin seeded user)
  #   ADMIN_PASSWORD            (initial password — change immediately via UI)

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type        = "requests"
    soft_limit  = 200
    hard_limit  = 250

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "20s"
    method       = "GET"
    path         = "/up"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
  cpus   = 1

[deploy]
  # entrypoint.sh already runs migrate + conditional seed on every boot;
  # no separate release_command needed.
  strategy = "rolling"

[[mounts]]
  source      = "kabinet_storage"
  destination = "/var/www/html/storage/app"
